<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LotoMath Pro™ Cuba Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Aquí va todo tu CSS original (lo he omitido por espacio, pero mantén el tuyo) */
:root{--bg:#05070d;--gold:#D4AF37;--text:#c5d4ee;--fl:#0052cc;}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;margin:0;}
.app{padding:20px;}
.rball{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:rgba(0,82,204,.1);border:1px solid var(--fl);font-family:'JetBrains Mono';font-weight:700;margin:2px;}
</style>
</head>
<body>
<div class="app">
    <header style="border-bottom:1px solid #1a2438;padding-bottom:15px;margin-bottom:20px;">
        <h1 style="font-family:'JetBrains Mono';font-size:22px;">LotoMath<span style="color:var(--gold)">Pro</span>™ <small style="font-size:12px;color:#4a6284;">Cuba Edition</small></h1>
        <div id="update-status" style="font-size:10px;color:#0bbfa8;">● ACTUALIZADO AUTOMÁTICAMENTE</div>
    </header>

    <section id="seccion-florida">
        <h2 style="font-size:16px;color:var(--gold);">🌴 FLORIDA PICK 3</h2>
        <div id="ultimos-resultados-fl" style="margin:15px 0;">
            </div>
    </section>

    <hr style="border:0;border-top:1px solid #1a2438;margin:20px 0;">

    <section id="historico">
        <h3 style="font-size:14px;color:#4a6284;">HISTÓRICO RECIENTE</h3>
        <div id="lista-historico"></div>
    </section>
</div>

<script>
// ESTA ES LA ESTRUCTURA QUE EL ROBOT DE PYTHON BUSCARÁ PARA ACTUALIZAR
// NO CAMBIES EL NOMBRE DE ESTAS VARIABLES
const DATA_ESTADISTICA = {
    pick3fl: {
        id: 'pick3fl',
        name: 'Florida Pick 3',
        // EL ROBOT ACTUALIZARÁ ESTA LISTA AUTOMÁTICAMENTE
        results: [
            {date:'03/29', time:'Noche', nums:[1,0,2]},
            {date:'03/29', time:'Mediodía', nums:[4,8,5]},
            {date:'03/28', time:'Noche', nums:[7,3,9]},
            {date:'03/28', time:'Mediodía', nums:[0,1,6]},
            {date:'03/27', time:'Noche', nums:[5,5,2]}
        ]
    }
};

// Función para mostrar los resultados en pantalla
function render() {
    const res = DATA_ESTADISTICA.pick3fl.results;
    const container = document.getElementById('ultimos-resultados-fl');
    const histContainer = document.getElementById('lista-historico');
    
    // Mostrar el último resultado grande
    const ultimo = res[0];
    container.innerHTML = `
        <div style="font-size:12px;margin-bottom:5px;">Sorteo: ${ultimo.date} (${ultimo.time})</div>
        <div>${ultimo.nums.map(n => `<div class="rball">${n}</div>`).join('')}</div>
    `;

    // Mostrar el resto en el histórico
    histContainer.innerHTML = res.slice(1).map(r => `
        <div style="font-size:11px;padding:5px 0;border-bottom:1px solid #0e1220;">
            ${r.date} - ${r.nums.join(' · ')}
        </div>
    `).join('');
}

render();
</script>
</body>
</html>
