<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LotoMath Pro™ Cuba</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#05070d;--s1:#090c16;--b1:#1a2438;--gold:#D4AF37;--text:#c5d4ee;--dim:#4a6284;--teal:#0bbfa8;--fl:#0052cc;}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;margin:0;line-height:1.6;}
.topbar{background:rgba(5,7,13,.98);border-bottom:1px solid var(--b1);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.main{padding:16px 22px;max-width:800px;margin:0 auto;}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:11px;padding:15px;margin-bottom:15px;}
.rball{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-weight:700;background:rgba(0,82,204,.1);border:1px solid var(--fl);color:#6699ff;margin-right:5px;font-size:12px;}
.re-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(26,36,56,.4);}
</style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <div style="font-family:'JetBrains Mono';font-weight:700;">LotoMath<span style="color:var(--gold)">Pro</span>™</div>
        <div style="font-size:10px;color:var(--teal);">● SISTEMA AUTOMATIZADO</div>
    </header>
    <main class="main">
        <div class="card">
            <div style="color:var(--dim);font-size:11px;margin-bottom:10px;display:flex;justify-content:space-between;">
                <span>🌴 Florida Pick 3</span>
                <span id="last-date" style="color:var(--gold)">--/--</span>
            </div>
            <div id="hero-numbers" style="display:flex;"></div>
        </div>
        <div class="card">
            <div style="color:var(--dim);font-size:11px;margin-bottom:10px;">📋 HISTÓRICO RECIENTE</div>
            <div id="history-list"></div>
        </div>
    </main>
</div>
<script>
/* ESTRUCTURA PROTEGIDA - EL ROBOT BUSCA "results: [" */
const DATA_LOTO = {
    pick3fl: {
        results: [
            {date:'03/29', time:'Noche', nums:[1,0,2]},
            {date:'03/29', time:'Mediodía', nums:[4,8,5]},
            {date:'03/28', time:'Noche', nums:[7,3,9]},
            {date:'03/28', time:'Mediodía', nums:[0,1,6]},
            {date:'03/27', time:'Noche', nums:[5,5,2]}
        ]
    }
};

function init() {
    const res = DATA_LOTO.pick3fl.results;
    if(!res || res.length === 0) return;
    const ultimo = res[0];
    document.getElementById('last-date').innerText = ultimo.date + ' (' + ultimo.time + ')';
    document.getElementById('hero-numbers').innerHTML = ultimo.nums.map(n => `<div class="rball">${n}</div>`).join('');
    document.getElementById('history-list').innerHTML = res.slice(1).map(r => `
        <div class="re-row">
            <div style="font-family:'JetBrains Mono';font-size:11px;">${r.date}</div>
            <div>${r.nums.map(n => `<span class="rball" style="width:24px;height:24px;font-size:10px;">${n}</span>`).join('')}</div>
            <div style="font-size:10px;color:var(--dim);">${r.time}</div>
        </div>
    `).join('');
}
window.onload = init;
</script>
</body>
</html>
