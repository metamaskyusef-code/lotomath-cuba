name: Actualizar Resultados Lotería
on:
  workflow_dispatch: # Activa el botón gris

permissions:
  contents: write # <--- DA EL PERMISO QUE TE FALTA

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Ejecutar actualización
        run: python update_lotto.py
      - name: Guardar cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Auto-update lotto" || echo "Sin cambios"
          git push
