name: Actualizar Resultados Lotería
on:
  schedule:
    - cron: '0 4 * * *' # Se ejecuta a las 4:00 AM UTC (Medianoche en Cuba/NY)
  workflow_dispatch: # Esto activa el botón gris para que pruebes ahora mismo

permissions:
  contents: write # ESTA ES LA LLAVE MAESTRA

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Ejecutar actualización
        run: python update_lotto.py
        
      - name: Guardar cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Resultados actualizados automáticamente" || echo "Sin cambios"
          git push
